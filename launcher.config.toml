# ============================================================================
# launcher.config.toml — Edita este archivo para personalizar el launcher
# ============================================================================
# Guía completa: docs/customization-guide.md

[branding]
# IMPORTANTE: internal_id se usa para las rutas en AppData del usuario.
# Cámbialo antes de publicar. NO lo cambies después de que haya usuarios reales.
internal_id      = "mc-launcher-template"
display_name     = "Mi Servidor MC"
window_title     = "Mi Servidor — Launcher"
description      = "Launcher oficial de Mi Servidor"
publisher        = "Tu Comunidad"
copyright        = "© 2026 Tu Nombre"

# Colores del tema (hex)
primary_color    = "#7c3aed"
secondary_color  = "#1e293b"
accent_color     = "#f59e0b"

# Assets en la carpeta assets/
logo             = "logo.png"          # 256×256+
icon             = "icon.ico"          # Windows
icon_png         = "icon.png"          # Linux/macOS
background       = "background.jpg"   # 1920×1080 recomendado
splash_video     = ""                  # opcional, MP4

heading_font     = "Inter"
body_font        = "Inter"

[branding.social]
discord = "https://discord.gg/tu-server"
website = "https://miservidor.com"
twitter = ""
youtube = ""
donate  = ""

[server]
display_name              = "Mi Servidor"
address                   = "play.miservidor.com"
port                      = 25565

# Proveedor del manifest: "http" | "git" | "file"
manifest_provider         = "file"
manifest_url              = "C:/Users/Usuario/Documents/GitHub/NSMP/manifest-signed.json"
manifest_git_repo         = ""
manifest_git_branch       = "main"
manifest_git_path         = "manifest.json"

# Clave pública Ed25519 (hex). Vacío = modo dev, no verifica firma.
manifest_public_key       = "950322f8beb87a14fb005599cab76d9c74f7db0b0ba86943004e54ef133cd43a"

update_check_interval_secs = 300
status_endpoint           = ""

# URL de un instances-registry.json remoto (opcional).
# Si se define, el launcher descarga la lista de instancias al arrancar desde esta URL
# en lugar de usar (o además de) las [[instances]] definidas abajo en este archivo.
# Esto permite agregar/quitar instancias sin redistribuir el launcher.
# Ejemplo: "https://files.miservidor.com/instances.json"
# Ver: instances-registry.example.json para el formato esperado.
instances_url             = ""

[updater]
# Pon enabled = true y configura release_url cuando tengas un servidor de releases.
enabled            = false
release_url        = "https://api.miservidor.com/launcher/releases/{{target}}/{{arch}}/{{current_version}}"
# Contenido de updater.key.pub (generado con: npm run tauri -- signer generate -w updater.key)
# La clave privada (updater.key) se guarda fuera del repo y se usa como env var en CI:
#   TAURI_SIGNING_PRIVATE_KEY=<contenido del archivo>
release_public_key = "dW50cnVzdGVkIGNvbW1lbnQ6IG1pbmlzaWduIHB1YmxpYyBrZXk6IEExNDQyQkFDMUFEMkMyQzkKUldUSnd0SWFyQ3RFb1FIOThVZXl3SWdUbTdidldEai81c1hOeVpXOERQOFl1VEp1eFZlSVVSaVUK"

[features]
allow_optional_mods            = true
allow_ram_config               = true
allow_jvm_args_edit            = false
allow_java_path_override       = true
allow_game_directory_override  = false
show_advanced_logs             = true
show_news                      = true
quick_connect                  = true

[runtime]
ram_min_mb           = 2048
ram_max_mb           = 16384
ram_default_mb       = 4096
default_jvm_args     = [
    "-XX:+UnlockExperimentalVMOptions",
    "-XX:+UseG1GC",
    "-XX:G1NewSizePercent=20",
    "-XX:G1ReservePercent=20",
    "-XX:MaxGCPauseMillis=50",
    "-XX:G1HeapRegionSize=32M",
]
download_concurrency = 8
download_timeout_secs = 120
# Versión de MC a usar cuando no hay manifest de servidor cargado (modo dev/offline)
fallback_mc_version  = "1.21.1"

[java]
# "detect_or_download" | "always_download" | "system_only"
strategy     = "detect_or_download"
# "temurin" | "zulu" | "graalvm"
distribution = "temurin"

[auth]
# Registra tu propia app en: https://portal.azure.com → Azure AD → App registrations
# Tipo: "Personal Microsoft accounts only"
# Redirect URI: http://localhost (tipo "Mobile and desktop applications")
# Permisos: XboxLive.signin offline_access
microsoft_client_id = "6d1d4abd-f93f-4807-8174-7b3f021aa2c0"   # ← pega aquí tu Application (client) ID

# ============================================================================
# Instancias múltiples (opcional)
# Si defines [[instances]], el [server] de arriba se ignora y cada instancia
# tiene sus propios mods, manifest y directorio de juego.
# Si solo tienes un servidor, no necesitas esta sección.
# ============================================================================

# [[instances]]
# id             = "survival"                             # PERMANENTE — afecta rutas en disco
# display_name   = "Supervivencia"
# description    = "Servidor principal"
# manifest_url   = "https://files.miservidor.com/survival/manifest.json"
# manifest_provider = "http"
# color          = "#7c3aed"                              # color del tab en la UI
# server_address = "play.miservidor.com"
# server_port    = 25565
#
# [[instances]]
# id             = "test"
# display_name   = "Test 🔧"
# description    = "Servidor de pruebas"
# manifest_url   = "https://files.miservidor.com/test/manifest.json"
# manifest_provider = "http"
# color          = "#16a34a"
# server_address = "test.miservidor.com"
# server_port    = 25565

[curseforge]
# También acepta la variable de entorno CURSEFORGE_API_KEY en tiempo de compilación
api_key = ""

[telemetry]
enabled         = false
endpoint        = ""
report_launches = false
report_crashes  = false
report_hardware = false
